<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iannucci S.R.L. - Foglio Viaggio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        const firebaseConfig = { 
            apiKey: "AIzaSyB2Dpaitsgpyzs_Np-pIfl9fCLEG_x2UbU",
            authDomain: "iannucciviaggi.firebaseapp.com",
            projectId: "iannucciviaggi",
            storageBucket: "iannucciviaggi.firebasestorage.app",
            messagingSenderId: "215544582908",
            appId: "1:215544582908:web:dbb16286e3acbe55b57d79"
        };
        window.db = getFirestore(initializeApp(firebaseConfig));
    </script>
    <style>@media print { .no-print { display: none !important; } }</style>
</head>
<body class="bg-slate-950 text-slate-200">
<div class="max-w-md mx-auto px-4 pt-6 pb-24">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-xl font-extrabold text-white">IANNUCCI S.R.L.</h1>
            <p class="text-[10px] text-blue-400 font-bold uppercase">Foglio di Viaggio Digitale</p>
        </div>
        <button onclick="chiudiTour()" class="bg-red-900/30 border border-red-500/30 text-red-400 text-[10px] px-3 py-2 rounded-xl font-bold active:scale-95">🛑 CHIUDI TOUR</button>
    </div>

    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 mb-4 space-y-3">
        <input type="text" id="autista" placeholder="NOME AUTISTA" class="w-full bg-slate-800 p-3 rounded-xl font-bold uppercase text-sm" oninput="salvaPersistenti()">
        <div class="grid grid-cols-2 gap-2">
            <input type="text" id="bus" placeholder="BUS N°" class="bg-slate-800 p-3 rounded-xl font-bold uppercase text-sm" oninput="salvaPersistenti()">
            <input type="text" id="targa" placeholder="TARGA" class="bg-slate-800 p-3 rounded-xl font-bold uppercase text-sm" oninput="salvaPersistenti()">
        </div>
        <input type="date" id="data" class="w-full bg-slate-800 p-3 rounded-xl font-bold text-sm">
    </div>

    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 mb-4">
        <h3 class="text-[10px] font-bold text-blue-400 uppercase mb-2">🗺️ Rilevamento KM</h3>
        <div class="grid grid-cols-2 gap-3">
            <input type="number" id="km_inizio" placeholder="KM Inizio" class="bg-slate-800 p-3 rounded-xl font-bold text-sm">
            <input type="number" id="km_fine" placeholder="KM Arrivo" class="bg-slate-800 p-3 rounded-xl font-bold text-sm">
        </div>
    </div>

    <div id="container_rifornimenti" class="space-y-2 mb-4"></div>
    <div id="container_spese" class="space-y-2 mb-4"></div>
    
    <div class="grid grid-cols-2 gap-2 mb-6">
        <button onclick="aggiungiRifornimento()" class="bg-amber-600/10 text-amber-500 py-2 rounded-xl text-[9px] font-extrabold uppercase">+ Rifornimento</button>
        <button onclick="aggiungiSpesa()" class="bg-blue-600/10 text-blue-400 py-2 rounded-xl text-[9px] font-extrabold uppercase">+ Spesa</button>
    </div>

    <div class="space-y-3">
        <button onclick="window.print()" class="w-full bg-white text-slate-950 py-4 rounded-xl font-black uppercase text-sm">📄 GENERA PDF</button>
        <button onclick="inviaUfficio()" class="w-full bg-emerald-600 py-4 rounded-xl font-black uppercase text-white shadow-lg">🚀 INVIA IN DITTA</button>
        <button onclick="giornoSuccessivo()" class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-bold uppercase text-slate-400">➡️ GIORNO SUCCESSIVO</button>
    </div>
</div>

<script>
    let rifornimenti = [];
    let spese = [];
    
    // Caricamento dati persistenti al caricamento
    window.onload = () => {
        document.getElementById('data').valueAsDate = new Date();
        const saved = JSON.parse(localStorage.getItem('datiPersistenti') || '{}');
        document.getElementById('autista').value = saved.autista || '';
        document.getElementById('bus').value = saved.bus || '';
        document.getElementById('targa').value = saved.targa || '';
    };

    function salvaPersistenti() {
        localStorage.setItem('datiPersistenti', JSON.stringify({
            autista: document.getElementById('autista').value,
            bus: document.getElementById('bus').value,
            targa: document.getElementById('targa').value
        }));
    }

    function chiudiTour() {
        if(confirm("Chiudere il tour e resettare KM e spese?")) {
            document.getElementById('km_inizio').value = '';
            document.getElementById('km_fine').value = '';
            rifornimenti = []; spese = []; render();
        }
    }

    function giornoSuccessivo() {
        document.getElementById('km_inizio').value = document.getElementById('km_fine').value;
        document.getElementById('km_fine').value = '';
        rifornimenti = []; spese = []; render();
    }

    // ... (Mantieni le funzioni render, update e inviaUfficio del blocco precedente) ...
</script>
</body>
</html>
