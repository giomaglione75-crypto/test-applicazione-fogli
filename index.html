<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iannucci S.R.L. - Foglio Viaggio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        const firebaseConfig = { /* ... la tua config ... */ };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-md mx-auto p-4 space-y-4">
        <input type="date" id="data" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700">
        
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
            <input type="text" id="autista" placeholder="AUTISTA" class="w-full bg-slate-800 p-2 rounded mb-2 uppercase font-bold">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="bus" placeholder="BUS" class="bg-slate-800 p-2 rounded uppercase font-bold">
                <input type="text" id="targa" placeholder="TARGA" class="bg-slate-800 p-2 rounded uppercase font-bold">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="km_inizio" placeholder="KM Inizio" class="bg-slate-800 p-3 rounded-xl">
            <input type="number" id="km_fine" placeholder="KM Fine" class="bg-slate-800 p-3 rounded-xl">
        </div>

        <div id="spese_container" class="space-y-2"></div>
        <button onclick="aggiungiRigaSpesa()" class="w-full border border-blue-600 text-blue-400 py-2 rounded-xl text-xs font-bold uppercase">+ Aggiungi Spesa</button>

        <input type="file" id="foto_scontrino" accept="image/*" multiple class="hidden">
        <button onclick="document.getElementById('foto_scontrino').click()" class="w-full bg-slate-800 py-3 rounded-xl">📸 Carica Scontrini</button>

        <div class="grid grid-cols-1 gap-2 pt-4">
            <button onclick="generaPDF()" class="bg-blue-600 py-4 rounded-xl font-bold">📄 GENERA PDF (Autista)</button>
            <button onclick="inviaUfficio()" class="bg-emerald-600 py-4 rounded-xl font-bold">🚀 INVIA ALL'UFFICIO</button>
            <button onclick="giornoSuccessivo()" class="bg-slate-700 py-3 rounded-xl text-sm">➡️ Giorno Successivo</button>
        </div>
    </div>

    <script>
        let spese = [];
        
        // Inizializza data odierna
        document.getElementById('data').valueAsDate = new Date();

        function aggiungiRigaSpesa(categoria='PARCHEGGIO', desc='', imp='') {
            const id = Date.now();
            spese.push({ id, categoria, desc, imp });
            renderSpese();
        }

        function renderSpese() {
            document.getElementById('spese_container').innerHTML = spese.map(s => `
                <div class="bg-slate-900 p-2 rounded flex gap-2 items-center text-xs">
                    <select onchange="aggiornaSpesa(${s.id}, 'categoria', this.value)" class="bg-slate-800 p-1">
                        <option value="PARCHEGGIO" ${s.categoria=='PARCHEGGIO'?'selected':''}>Park</option>
                        <option value="AUTOSTRADA" ${s.categoria=='AUTOSTRADA'?'selected':''}>Auto</option>
                        <option value="GASOLIO" ${s.categoria=='GASOLIO'?'selected':''}>Gas</option>
                        <option value="ADBLUE" ${s.categoria=='ADBLUE'?'selected':''}>Blue</option>
                        <option value="PASTI" ${s.categoria=='PASTI'?'selected':''}>Pasti</option>
                        <option value="HOTEL" ${s.categoria=='HOTEL'?'selected':''}>Hotel</option>
                        <option value="VARIE" ${s.categoria=='VARIE'?'selected':''}>Varie</option>
                    </select>
                    <input type="text" placeholder="Desc" value="${s.desc}" oninput="aggiornaSpesa(${s.id}, 'desc', this.value)" class="w-full bg-slate-800 p-1">
                    <input type="number" placeholder="€" value="${s.imp}" oninput="aggiornaSpesa(${s.id}, 'imp', this.value)" class="w-16 bg-slate-800 p-1">
                    <button onclick="rimuoviSpesa(${s.id})" class="text-red-500">X</button>
                </div>
            `).join('');
        }

        function aggiornaSpesa(id, campo, val) { const s = spese.find(x => x.id === id); if(s) s[campo] = val; }
        function rimuoviSpesa(id) { spese = spese.filter(x => x.id !== id); renderSpese(); }

        async function inviaUfficio() {
            const dati = {
                autista: document.getElementById('autista').value,
                data: document.getElementById('data').value,
                km_inizio: document.getElementById('km_inizio').value,
                km_fine: document.getElementById('km_fine').value,
                spese: spese,
                timestamp: new Date()
            };
            // Qui Firestore addDoc...
            alert("Inviato all'ufficio!");
        }

        function giornoSuccessivo() {
            const fine = document.getElementById('km_fine').value;
            // Sposta km fine su km inizio e pulisci spese
            document.getElementById('km_inizio').value = fine;
            document.getElementById('km_fine').value = '';
            spese = [];
            renderSpese();
        }

        function generaPDF() {
            alert("Generazione PDF locale per autista...");
            // Logica stampa PDF...
        }
    </script>
</body>
</html>
