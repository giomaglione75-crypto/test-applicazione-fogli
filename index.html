<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iannucci S.R.L. - Foglio Viaggio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyB2Dpaitsgpyzs_Np-pIfl9fCLEG_x2UbU",
            authDomain: "iannucciviaggi.firebaseapp.com",
            projectId: "iannucciviaggi",
            storageBucket: "iannucciviaggi.firebasestorage.app",
            messagingSenderId: "215544582908",
            appId: "1:215544582908:web:dbb16286e3acbe55b57d79"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
<div class="max-w-md mx-auto px-4 pt-6 pb-24">
    <div class="bg-slate-900 rounded-2xl p-4 mb-4 border border-slate-800">
        <input type="date" id="input_data" class="w-full bg-slate-800 p-2 rounded mb-3 font-bold border border-slate-700">
        <input type="text" id="input_autista" placeholder="AUTISTA" class="w-full bg-slate-800 p-2 rounded mb-2 uppercase font-bold text-sm">
        <div class="grid grid-cols-2 gap-2">
            <input type="text" id="input_bus" placeholder="BUS" class="bg-slate-800 p-2 rounded uppercase font-bold text-sm">
            <input type="text" id="input_targa" placeholder="TARGA" class="bg-slate-800 p-2 rounded uppercase font-bold text-sm">
        </div>
    </div>

    <div class="bg-slate-900 rounded-2xl p-4 mb-4 border border-slate-800">
        <h3 class="text-xs font-bold text-blue-400 uppercase mb-2">Chilometraggio</h3>
        <div class="grid grid-cols-2 gap-3">
            <input type="number" id="input_km_partenza" placeholder="KM Inizio" class="bg-slate-800 p-2 rounded text-sm font-bold">
            <input type="number" id="input_km_arrivo" placeholder="KM Arrivo" class="bg-slate-800 p-2 rounded text-sm font-bold">
        </div>
    </div>

    <div class="mb-4">
        <h3 class="text-xs font-bold text-amber-400 uppercase mb-2 px-1">⛽ Rifornimenti</h3>
        <div id="container_rifornimenti" class="space-y-2"></div>
        <button onclick="aggiungiRifornimento()" class="w-full mt-2 bg-amber-600/10 text-amber-500 py-2 rounded-xl text-[10px] font-extrabold uppercase">+ Aggiungi Rifornimento</button>
    </div>

    <div class="mb-6">
        <h3 class="text-xs font-bold text-blue-400 uppercase mb-2 px-1">💶 Spese Operative</h3>
        <div id="container_spese" class="space-y-2"></div>
        <button onclick="aggiungiSpesa()" class="w-full mt-2 bg-blue-600/10 text-blue-400 py-2 rounded-xl text-[10px] font-extrabold uppercase">+ Aggiungi Spesa</button>
    </div>

    <button onclick="inviaUfficio()" class="w-full bg-emerald-600 py-4 rounded-xl font-black uppercase text-white shadow-lg">🚀 INVIA IN DITTA</button>
</div>

<script>
    let rifornimenti = [];
    let spese = [];
    document.getElementById('input_data').valueAsDate = new Date();

    function aggiungiRifornimento() {
        rifornimenti.push({ id: Date.now(), tipo: 'GASOLIO', litri: 0, prezzo: 0, totale: 0 });
        renderRifornimenti();
    }

    function aggiungiSpesa() {
        spese.push({ id: Date.now(), tipo: 'PARCHEGGIO', desc: '', importo: 0 });
        renderSpese();
    }

    function renderRifornimenti() {
        document.getElementById('container_rifornimenti').innerHTML = rifornimenti.map(r => `
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 grid grid-cols-2 gap-2 text-xs">
                <select onchange="updateRif(${r.id}, 'tipo', this.value)" class="col-span-2 bg-slate-800 p-1 rounded font-bold"><option>GASOLIO</option><option>ADBLUE</option></select>
                <input type="number" step="0.01" placeholder="Litri" oninput="updateRif(${r.id}, 'litri', this.value)" class="bg-slate-800 p-1 rounded">
                <input type="number" step="0.001" placeholder="Prezzo/Lt" oninput="updateRif(${r.id}, 'prezzo', this.value)" class="bg-slate-800 p-1 rounded">
                <div class="col-span-2 text-right font-bold text-amber-400">Totale: € ${r.totale.toFixed(2)}</div>
            </div>
        `).join('');
    }

    function updateRif(id, campo, val) {
        const r = rifornimenti.find(x => x.id === id);
        if(r) {
            r[campo] = val;
            r.totale = r.litri * r.prezzo;
            renderRifornimenti();
        }
    }

    function renderSpese() {
        document.getElementById('container_spese').innerHTML = spese.map(s => `
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 text-xs space-y-1">
                <select onchange="updateSpesa(${s.id}, 'tipo', this.value)" class="w-full bg-slate-800 p-1 rounded font-bold uppercase">
                    <option value="PARCHEGGIO">Parcheggio</option><option value="AUTOSTRADA">Autostrada</option>
                    <option value="PASTI">Pasti</option><option value="HOTEL">Hotel</option><option value="VARIE">Varie</option>
                </select>
                <input type="text" placeholder="Dettaglio" oninput="updateSpesa(${s.id}, 'desc', this.value)" class="w-full bg-slate-800 p-1 rounded">
                <input type="number" placeholder="Importo €" oninput="updateSpesa(${s.id}, 'importo', this.value)" class="w-full bg-slate-800 p-1 rounded font-bold text-blue-400">
            </div>
        `).join('');
    }

    function updateSpesa(id, campo, val) {
        const s = spese.find(x => x.id === id);
        if(s) s[campo] = val;
    }

    async function inviaUfficio() {
        const { collection, addDoc } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js");
        const dati = {
            autista: document.getElementById('input_autista').value,
            rifornimenti,
            spese,
            timestamp: new Date()
        };
        console.log("Inviando...", dati);
        alert("Dati inviati all'ufficio!");
    }
</script>
</body>
</html>
