<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iannucci S.R.L. - Gestione Viaggi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyB2Dpaitsgpyzs_Np-pIfl9fCLEG_x2UbU",
            authDomain: "iannucciviaggi.firebaseapp.com",
            projectId: "iannucciviaggi",
            storageBucket: "iannucciviaggi.firebasestorage.app",
            messagingSenderId: "215544582908",
            appId: "1:215544582908:web:dbb16286e3acbe55b57d79"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
    <div class="max-w-md mx-auto px-4 pt-6 pb-24">
        <h1 class="text-2xl font-black text-white mb-6">IANNUCCI S.R.L.</h1>
        
        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 mb-4">
            <input type="text" id="autista" placeholder="NOME AUTISTA" class="w-full bg-slate-800 p-3 rounded-xl mb-2 font-bold uppercase">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="bus" placeholder="BUS N°" class="bg-slate-800 p-3 rounded-xl font-bold uppercase">
                <input type="text" id="targa" placeholder="TARGA" class="bg-slate-800 p-3 rounded-xl font-bold uppercase">
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-2xl border border-blue-900/30 mb-6">
            <h3 class="text-xs font-bold text-blue-400 uppercase mb-3">Rilevamento Chilometri</h3>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="km_partenza" placeholder="KM Inizio" class="bg-slate-800 p-3 rounded-xl font-bold">
                <input type="number" id="km_arrivo" placeholder="KM Arrivo" class="bg-slate-800 p-3 rounded-xl font-bold">
            </div>
        </div>

        <h3 class="text-xs font-bold text-slate-400 uppercase mb-3 px-1">Spese di Giornata</h3>
        <div id="spese_container" class="space-y-4"></div>
        <button onclick="aggiungiRigaSpesa()" class="w-full mt-4 border border-blue-600/50 text-blue-400 py-3 rounded-xl font-bold uppercase text-xs">+ Aggiungi Spesa</button>

        <button onclick="inviaUfficio()" class="w-full mt-8 bg-emerald-600 py-4 rounded-xl font-black uppercase text-white shadow-lg active:scale-95 transition-transform">Invia all'ufficio</button>
    </div>

    <script>
        let spese = [];

        function aggiungiRigaSpesa(categoria = 'PARCHEGGIO', desc = '', imp = '') {
            const id = Date.now();
            spese.push({ id, categoria, desc, imp });
            renderSpese();
        }

        function renderSpese() {
            const container = document.getElementById('spese_container');
            container.innerHTML = spese.map(s => `
                <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 relative">
                    <button onclick="rimuoviSpesa(${s.id})" class="absolute top-2 right-2 text-red-500 text-xs">X</button>
                    <select onchange="aggiornaSpesa(${s.id}, 'categoria', this.value)" class="w-full bg-slate-800 p-2 rounded-lg font-bold text-xs uppercase mb-2">
                        <option value="PARCHEGGIO" ${s.categoria=='PARCHEGGIO'?'selected':''}>Parcheggio</option>
                        <option value="AUTOSTRADA" ${s.categoria=='AUTOSTRADA'?'selected':''}>Autostrada</option>
                        <option value="GASOLIO" ${s.categoria=='GASOLIO'?'selected':''}>Gasolio</option>
                        <option value="ADBLUE" ${s.categoria=='ADBLUE'?'selected':''}>AdBlue</option>
                        <option value="PASTI" ${s.categoria=='PASTI'?'selected':''}>Pasti</option>
                        <option value="HOTEL" ${s.categoria=='HOTEL'?'selected':''}>Hotel</option>
                        <option value="VARIE" ${s.categoria=='VARIE'?'selected':''}>Varie</option>
                    </select>
                    <input type="text" placeholder="Descrizione (opzionale)" value="${s.desc}" oninput="aggiornaSpesa(${s.id}, 'desc', this.value)" class="w-full bg-slate-800 p-2 rounded-lg text-sm mb-2">
                    <input type="number" placeholder="€ Importo" value="${s.imp}" oninput="aggiornaSpesa(${s.id}, 'imp', this.value)" class="w-full bg-slate-800 p-2 rounded-lg font-bold text-amber-400">
                </div>
            `).join('');
        }

        function aggiornaSpesa(id, campo, val) {
            const s = spese.find(x => x.id === id);
            if(s) s[campo] = val;
        }

        function rimuoviSpesa(id) {
            spese = spese.filter(x => x.id !== id);
            renderSpese();
        }

        async function inviaUfficio() {
            const dati = {
                autista: document.getElementById('autista').value,
                bus: document.getElementById('bus').value,
                km_partenza: document.getElementById('km_partenza').value,
                km_arrivo: document.getElementById('km_arrivo').value,
                spese: spese,
                data: new Date().toISOString()
            };
            console.log("Dati pronti per Firebase:", dati);
            alert("Foglio di viaggio inviato con successo!");
        }
    </script>
</body>
</html>
