<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iannucci S.R.L. - App Viaggio</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="App Viaggio">

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getStorage } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2Dpaitsgpyzs_Np-pIfl9fCLEG_x2UbU",
            authDomain: "iannucciviaggi.firebaseapp.com",
            projectId: "iannucciviaggi",
            storageBucket: "iannucciviaggi.firebasestorage.app",
            messagingSenderId: "215544582908",
            appId: "1:215544582908:web:dbb16286e3acbe55b57d79"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.storage = getStorage(app);
    </script>
    <script class="no-print" src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

<div class="max-w-md mx-auto px-4 pt-6 pb-24 no-print">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight text-white">IANNUCCI S.R.L.</h1>
            <p class="text-xs text-blue-400 font-bold uppercase tracking-wider">Foglio di Viaggio Digitale</p>
        </div>
        <button onclick="confermaInizioViaggio()" class="bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 border border-blue-500/30 text-xs px-3.5 py-2 rounded-xl font-bold transition-all active:scale-95">🚀 INIZIA TOUR</button>
    </div>

    <!-- SEZIONE PERSONALE -->
    <div class="bg-slate-900 rounded-2xl p-4 mb-4 border border-slate-800 shadow-xl">
        <h3 class="text-xs font-extrabold text-blue-400 uppercase mb-3">👤 Personale e Bus</h3>
        <div class="space-y-3">
            <input type="text" id="input_autista" placeholder="NOME AUTISTA" class="w-full bg-slate-800 border-slate-700 rounded-xl px-3.5 py-3 text-sm font-semibold">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="input_bus" placeholder="BUS N°" class="w-full bg-slate-800 border-slate-700 rounded-xl px-3.5 py-3 text-sm font-semibold">
                <input type="text" id="input_targa" placeholder="TARGA" class="w-full bg-slate-800 border-slate-700 rounded-xl px-3.5 py-3 text-sm font-semibold">
            </div>
            <input type="date" id="input_data" class="w-full bg-slate-800 border-slate-700 rounded-xl px-3.5 py-3 text-sm font-bold">
        </div>
    </div>

    <!-- RILEVAMENTO KM -->
    <div class="bg-slate-900 rounded-2xl p-4 mb-4 border border-slate-800 shadow-xl">
        <h3 class="text-xs font-extrabold text-blue-400 uppercase mb-3">🗺️ Rilevamento KM</h3>
        <div class="grid grid-cols-2 gap-3">
            <input type="number" id="input_km_partenza" placeholder="KM Partenza" class="w-full bg-slate-800 rounded-xl px-3.5 py-3 text-sm font-bold">
            <input type="number" id="input_km_arrivo" placeholder="KM Arrivo" class="w-full bg-slate-800 rounded-xl px-3.5 py-3 text-sm font-bold">
        </div>
    </div>

    <!-- SPESE DINAMICHE -->
    <div class="bg-slate-900 rounded-2xl p-4 mb-4 border border-slate-800 shadow-xl">
        <h3 class="text-xs font-extrabold text-blue-400 uppercase mb-3">💶 Spese di Giornata</h3>
        <div id="container_spese_dinamiche" class="space-y-3"></div>
        <button onclick="aggiungiSpesaDinamica('PARCHEGGIO')" class="w-full mt-3 bg-blue-600/10 text-blue-400 py-2 rounded-xl text-[10px] font-extrabold uppercase">➕ Aggiungi Spesa</button>
    </div>

    <!-- AZIONI -->
    <div class="space-y-3">
        <button onclick="generaStampaGiornata()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase text-sm">📄 GENERA PDF</button>
        <button onclick="inviaUfficio()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold uppercase text-sm">🚀 INVIA IN DITTA</button>
    </div>
</div>

<script>
    let registroSpeseDinamiche = [];

    function aggiungiSpesaDinamica(tipo = 'PARCHEGGIO', desc = '', importo = 0) {
        const id = Date.now();
        registroSpeseDinamiche.push({ id, tipo, desc, importo });
        renderSpeseDinamiche();
    }

    function renderSpeseDinamiche() {
        const container = document.getElementById("container_spese_dinamiche");
        container.innerHTML = registroSpeseDinamiche.map(s => `
            <div class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-xs">
                <select onchange="aggiornaSpesa(${s.id}, 'tipo', this.value)" class="bg-slate-900 w-full mb-2 p-2 rounded">
                    <option value="PARCHEGGIO" ${s.tipo=='PARCHEGGIO'?'selected':''}>Parcheggio</option>
                    <option value="AUTOSTRADA" ${s.tipo=='AUTOSTRADA'?'selected':''}>Autostrada</option>
                    <option value="GASOLIO" ${s.tipo=='GASOLIO'?'selected':''}>Gasolio</option>
                    <option value="ADBLUE" ${s.tipo=='ADBLUE'?'selected':''}>AdBlue</option>
                    <option value="PASTI" ${s.tipo=='PASTI'?'selected':''}>Pasti</option>
                    <option value="HOTEL" ${s.tipo=='HOTEL'?'selected':''}>Hotel</option>
                    <option value="VARIE" ${s.tipo=='VARIE'?'selected':''}>Varie</option>
                </select>
                <input type="text" placeholder="Dettaglio" value="${s.desc}" oninput="aggiornaSpesa(${s.id}, 'desc', this.value)" class="w-full bg-slate-900 p-2 rounded mb-2">
                <input type="number" step="0.01" placeholder="Importo €" value="${s.importo}" oninput="aggiornaSpesa(${s.id}, 'importo', this.value)" class="w-full bg-slate-900 p-2 rounded font-bold text-amber-400">
            </div>
        `).join('');
    }

    function aggiornaSpesa(id, campo, val) {
        const spesa = registroSpeseDinamiche.find(s => s.id === id);
        if (spesa) spesa[campo] = val;
    }

    async function inviaUfficio() {
        const { collection, addDoc } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js");
        try {
            await addDoc(collection(window.db, "viaggi"), {
                autista: document.getElementById('input_autista').value,
                data: document.getElementById('input_data').value,
                km: { inizio: document.getElementById('input_km_partenza').value, fine: document.getElementById('input_km_arrivo').value },
                spese: registroSpeseDinamiche,
                timestamp: new Date()
            });
            alert("Foglio inviato all'ufficio!");
        } catch (e) {
            alert("Errore invio: " + e.message);
        }
    }

    function generaStampaGiornata() { window.print(); }
    function giornoSuccessivo() { 
        document.getElementById('input_km_partenza').value = document.getElementById('input_km_arrivo').value;
        document.getElementById('input_km_arrivo').value = '';
    }
</script>
</body>
</html>
